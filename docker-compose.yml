version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceauth-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=faceauth;Username=postgres;Password=postgres
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: faceauth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: faceauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local
